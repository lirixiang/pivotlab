services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivotlab-app
    network_mode: host
    ipc: host
    volumes:
      - ./backend:/app/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://pivotlab:pivotlab@127.0.0.1:5433/pivotlab
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-qwen}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-qwen-turbo}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NCCL_DEBUG: WARN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pivotlab-db
    network_mode: host
    environment:
      POSTGRES_DB: pivotlab
      POSTGRES_USER: pivotlab
      POSTGRES_PASSWORD: pivotlab
    command: -p 5433
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivotlab -p 5433"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
