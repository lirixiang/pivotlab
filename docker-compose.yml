services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
    container_name: pivotlab
    ports:
      - "9173:80"
      - "8001:18080"
    volumes:
      - ./backend/models:/app/backend/models
      # NVIDIA GPU passthrough (manual mount for rootless docker)
      - /dev:/dev
      - /usr/lib/x86_64-linux-gnu/libcuda.so.570.172.08:/usr/lib/nvidia/libcuda.so.570.172.08:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.570.172.08:/usr/lib/nvidia/libnvidia-ml.so.570.172.08:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.570.172.08:/usr/lib/nvidia/libnvidia-ptxjitcompiler.so.570.172.08:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://pivotlab:pivotlab@db:5432/pivotlab
      NVIDIA_VISIBLE_DEVICES: "all"
      LD_LIBRARY_PATH: /usr/lib/nvidia
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}/postgres:16-alpine
    container_name: pivotlab-db
    environment:
      POSTGRES_DB: pivotlab
      POSTGRES_USER: pivotlab
      POSTGRES_PASSWORD: pivotlab
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivotlab"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
