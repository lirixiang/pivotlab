databases:
  - name: pivotlab-db
    plan: free
    databaseName: pivotlab
    user: pivotlab

services:
  - type: web
    name: pivotlab-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-demo.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pivotlab-db
          property: connectionString
      - key: SCHEDULER_DISABLED
        value: "1"
      - key: NUM_GPUS
        value: "0"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: LLM_DEFAULT_PROVIDER
        value: qwen
      - key: QWEN_API_KEY
        sync: false
